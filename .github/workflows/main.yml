name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses-dev libncursesw5-dev \
            libtinfo6 cmake libffi-dev libssl-dev build-essential \
            ccache libltdl-dev

      - name: Install Buildozer and Cython
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade buildozer cython==0.29.36

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}

      - name: Cache Buildozer project directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-project-${{ hashFiles('buildozer.spec') }}

      - name: Build APK (debug)
        run: |
          yes | buildozer android debug || buildozer android debug

      - name: List output
        run: ls -la bin/ || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: teacher-journal-apk
          path: bin/*.apk
          if-no-files-found: error
